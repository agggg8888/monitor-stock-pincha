name: Monitor Stock Pincha

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Restaurar estado anterior
        uses: actions/download-artifact@v4
        with:
          name: state
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Descargar monitor.py
        run: |
          curl -o monitor.py https://raw.githubusercontent.com/${{ github.repository }}/main/monitor.py

      - name: Ejecutar monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: python monitor.py

      - name: Guardar estado
        uses: actions/upload-artifact@v4
        with:
          name: state
          path: state.json
          overwrite: true
